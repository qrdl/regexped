name: RE2 Tests

on:
  pull_request:
    branches: [main]

jobs:
  re2-tests:
    name: RE2 test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run RE2 test suite
        working-directory: re2test
        run: make test
