name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build regexped
        run: go build -o regexped .
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: regexped
          path: regexped

  re2-tests:
    name: RE2 test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: re2test/go.mod
      - name: Build regexped
        run: go build -o regexped .
      - name: Run RE2 test suite
        working-directory: re2test
        run: make test
