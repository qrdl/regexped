name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build regexped
        run: go build -o regexped .
      - name: Run unit tests
        run: go test -coverprofile=coverage.out ./compile/... ./config/... ./generate/... ./merge/... ./internal/...
      - name: Upload coverage reports to Codecov
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload binary
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v7
        with:
          name: regexped
          path: regexped

  re2-tests:
    name: RE2 test suite
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run RE2 test suite
        working-directory: re2test
        run: make test

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: re2-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: regexped
      - name: Make binary executable
        run: chmod +x regexped
      - name: Download wasm-merge
        run: ./get_wasm_merge.sh
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: qrdl
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: qrdl/regexped:latest
