name: Scan

on:
  push:
  schedule:
    - cron: '0 0 * * 6'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          config: |
            paths-ignore:
              - re2test
              - perftest
              - examples

      - name: Build
        run: |
          go build -o regexped .
          go test ./compile/... ./config/... ./generate/... ./merge/... ./internal/...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  analyze-actions:
    name: Analyze Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
