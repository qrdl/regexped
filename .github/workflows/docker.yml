name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build regexped
        run: go build -o regexped .
      - name: Download wasm-merge
        run: ./get_wasm_merge.sh
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: qrdl
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: qrdl/regexped:latest
