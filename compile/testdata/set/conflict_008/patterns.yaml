# conflict_008: maxoff_overflow
# The mandatory literal is more than 256 bytes from the match start —
# findMandatoryLitRec's maxOff check causes it to return nil (maxOff > 256).
# These route to compileFallback.
patterns:
  - pattern: '[^\n]{257}foo\d+'
  - pattern: '[^\n]{300}bar\w+'
expect:
  bucket_count: 2
  fallback_count: 2
