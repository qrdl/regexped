# compat_005: large_multi_literal
# 10 patterns with distinct mandatory literals (5-7 bytes each). With the
# extended Teddy limit of 16, these use Teddy with partial probing.
patterns:
  - pattern: 'alpha\d+'
  - pattern: 'beta\w+'
  - pattern: 'gamma[a-z]+'
  - pattern: 'delta[0-9]+'
  - pattern: 'epsilon\d+'
  - pattern: 'zeta\w+'
  - pattern: 'eta[a-z]+'
  - pattern: 'theta[0-9]+'
  - pattern: 'iota\d+'
  - pattern: 'kappa\w+'
expect:
  frontend: teddy
