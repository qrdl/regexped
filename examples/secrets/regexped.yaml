wasm_merge: "../../../binaryen/bin/wasm-merge"
output:    "final.wasm"
stub_file: "src/stubs.rs"

regexes:
  - wasm_file:     "github.wasm"
    import_module: "github"
    pattern:       'ghp_[A-Za-z0-9]{36}'
    find_func:     "find_github_token"

  - wasm_file:     "jwt.wasm"
    import_module: "jwt"
    pattern:       'eyJ[A-Za-z0-9+/\-_]+\.[A-Za-z0-9+/\-_]+\.[A-Za-z0-9+/\-_]+'
    find_func:     "find_jwt_token"

  - wasm_file:     "aws.wasm"
    import_module: "aws"
    pattern:       'AKIA[A-Z0-9]{16}'
    find_func:     "find_aws_key"
