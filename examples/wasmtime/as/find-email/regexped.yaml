wasm_merge:    "../../../../../binaryen/bin/wasm-merge"
output:        "final.wasm"
wasm_file:     "email.wasm"
import_module: "email"
stub_file:     "stub.ts"
stub_type:     "as"

regexes:
  - pattern:          '(?P<user>[a-zA-Z0-9._%+-]+)@(?P<domain>[a-zA-Z0-9.-]+\.[a-zA-Z]{2,})'
    groups_func: "find_email"
