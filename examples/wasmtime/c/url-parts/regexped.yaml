wasm_merge:    "../../../../../binaryen/bin/wasm-merge"
output:        "final.wasm"
wasm_file:     "url_parts.wasm"
import_module: "url_parts"
stub_file:     "stub.h"

regexes:
  - pattern:          '(?P<scheme>https?)://(?P<host>[^/:?#\s]+)(?::(?P<port>[0-9]+))?(?P<path>/[^?#\s]*)?(?:\?(?P<query>[^#\s]*))?(?:#(?P<fragment>[^\s]*))?'
    groups_func: "parse_url"
