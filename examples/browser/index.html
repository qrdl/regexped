<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regexped Browser Demo</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 480px;
      margin: 60px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.3em; }
    p.subtitle { color: #666; font-size: 0.9rem; margin-top: 0; }
    .field { margin: 24px 0; }
    label { display: block; font-weight: bold; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .status {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.9rem;
      min-height: 1.2em;
    }
    .status.valid   { color: #2a7a2a; }
    .status.invalid { color: #b00; }
    #loading { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Regexped Browser Demo</h1>
  <p class="subtitle">Validation powered by compiled WASM — no JS regex engine.</p>

  <div id="loading">Loading WASM…</div>

  <div id="app" style="display:none">
    <div class="field">
      <label for="email">Email address</label>
      <input type="text" id="email" placeholder="user@example.com" autocomplete="off">
      <div class="status" id="email-status"></div>
    </div>
    <div class="field">
      <label for="url">URL</label>
      <input type="text" id="url" placeholder="https://example.com">
      <div class="status" id="url-status"></div>
    </div>
  </div>

  <script type="module">
    // regex.js is auto-generated by: regexped generate --js
    // Call init() with the WASM bytes before using any exported functions.
    import { init, email_match, url_match } from './regex.js';

    await init(await fetch('./regexps.wasm').then(r => r.arrayBuffer()));
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    function bind(inputId, statusId, matchFn) {
      const input  = document.getElementById(inputId);
      const status = document.getElementById(statusId);
      input.addEventListener('input', () => {
        if (!input.value) { status.textContent = ''; status.className = 'status'; return; }
        const ok = matchFn(input.value);
        status.textContent = ok ? '✓ valid' : '✗ invalid';
        status.className   = ok ? 'status valid' : 'status invalid';
      });
    }

    bind('email', 'email-status', email_match);
    bind('url',   'url-status',   url_match);
  </script>
</body>
</html>
